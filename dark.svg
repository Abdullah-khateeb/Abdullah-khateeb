<svg width="100%" height="auto" viewBox="0 0 1180 610" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="border-radius: 28px; background: #030712; overflow: hidden; font-family: ui-monospace, SFMono-Regular, Menlow, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;">
  
  <defs>
    <!-- Background Moving Gradient -->
    <radialGradient id="darkBgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.3">
        <animate attributeName="stop-opacity" values="0.3;0.1;0.3" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="0,0; -100,50; 50,-100; 0,0" dur="25s" repeatCount="indefinite" />
    </radialGradient>

    <!-- Noise Texture -->
    <filter id="noiseFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.6 0 0 0 0 0.6 0 0 0 0 0.6 0 0 0 0.03 0"/>
    </filter>

    <!-- Border Shimmer -->
    <linearGradient id="darkBorderGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.18)">
        <animate attributeName="offset" values="0;1;0" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="rgba(255,255,255,0.08)"/>
    </linearGradient>

    <!-- ASCII Portrait Gradient (Animated) -->
    <linearGradient id="asciiGradientDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4">
        <animate attributeName="stop-color" values="#06B6D4; #7C3AED; #10B981; #06B6D4" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#10B981">
        <animate attributeName="stop-color" values="#10B981; #06B6D4; #7C3AED; #10B981" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Glow Pulse Filter -->
    <filter id="glowPulse" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow/Mask for Skill Pills -->
    <filter id="skillGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feFlood flood-color="#06B6D4" flood-opacity="0.3"/>
      <feComposite in2="coloredBlur" operator="in"/>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes floating { 0% { transform: translate(0, 0px); } 50% { transform: translate(0, 8px); } 100% { transform: translate(0, 0px); } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes textLoop { 0%, 30.3% { opacity: 1; } 33.3%, 100% { opacity: 0; } }
    @keyframes textLoopTwo { 0%, 33.3% { opacity: 0; } 36.6%, 63.6% { opacity: 1; } 66.6%, 100% { opacity: 0; } }
    @keyframes textLoopThree { 0%, 66.6% { opacity: 0; } 70%, 97% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes cursorMove {
      0%, 30.3% { transform: translateX(105px); }
      33.3%, 63.6% { transform: translateX(200px); }
      66.6%, 97% { transform: translateX(290px); }
    }

    .floater { animation: floating 6s ease-in-out infinite; }
    .terminal-window { fill: #0F172A; stroke: rgba(255,255,255,0.08); stroke-width: 1px; }
    .ascii-text { font-size: 10px; fill: url(#asciiGradientDark); filter: url(#glowPulse); }
    .skill-pill { fill: #0F172A; stroke: rgba(255,255,255,0.08); stroke-width: 1px; transition: transform 0.2s; cursor: pointer; }
    .skill-pill:hover { transform: scale(1.05); filter: url(#skillGlow); }
    .cursor { fill: #F8FAFC; animation: blink 1s step-end infinite, cursorMove 12s infinite; }
    
    .loop-1 { animation: textLoop 12s infinite; }
    .loop-2 { animation: textLoopTwo 12s infinite; }
    .loop-3 { animation: textLoopThree 12s infinite; }
  </style>

  <!-- Background Base -->
  <rect width="1180" height="610" rx="28" fill="#030712"/>
  <rect width="1180" height="610" rx="28" fill="url(#darkBgGlow)"/>

  <!-- Static Moving Particles -->
  <circle cx="20%" cy="30%" r="2" fill="white" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/>
    <animateMotion dur="20s" repeatCount="indefinite" path="M0,0 C-20,10 20,40 0,60 C-20,80 20,100 0,0"/>
  </circle>
  <circle cx="80%" cy="70%" r="1.5" fill="cyan" opacity="0.1">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="5s" repeatCount="indefinite"/>
    <animateMotion dur="25s" repeatCount="indefinite" path="M0,0 C20,20 -20,60 0,80 C20,100 -20,0 0,0"/>
  </circle>

  <!-- Noise Overlay -->
  <rect width="1180" height="610" filter="url(#noiseFilter)"/>

  <!-- Scanline -->
  <rect width="1180" height="1" fill="#06B6D4" opacity="0.03">
    <animate attributeName="y" from="-10" to="610" dur="6s" repeatCount="indefinite" />
  </rect>

  <!-- Border Shimmer -->
  <rect x="0.5" y="0.5" width="1179" height="609" rx="27.5" fill="none" stroke="url(#darkBorderGradient)" stroke-width="1.5"/>

  <!-- LEFT SIDE: ASCII Portrait -->
  <g class="floater" style="transform-origin: 224px 305px;">
    <text x="50" y="80" class="ascii-text">
<tspan x="50" dy="0" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="0.1s" fill="freeze"/>        _        _</tspan>
<tspan x="50" dy="11" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="0.2s" fill="freeze"/>       / \      / \</tspan>
<tspan x="50" dy="11" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="0.3s" fill="freeze"/>      |   |----|   |</tspan>
<tspan x="50" dy="11" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="0.4s" fill="freeze"/>      |   |`.  |   |</tspan>
<tspan x="50" dy="11" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="0.5s" fill="freeze"/>       \_/   `--\_/</tspan>
<tspan x="50" dy="11" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="0.6s" fill="freeze"/>     _{_________}_</tspan>
<tspan x="50" dy="11" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="0.7s" fill="freeze"/>    /   _  v  _   \</tspan>
<tspan x="50" dy="11" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="0.8s" fill="freeze"/>   |   (.)   (.)   |</tspan>
<tspan x="50" dy="11" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="0.9s" fill="freeze"/>   |  __ `---' __  |</tspan>
<tspan x="50" dy="11" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="1.0s" fill="freeze"/>    \  \_|_|_|_/  /</tspan>
<tspan x="50" dy="11" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="1.1s" fill="freeze"/>     \_________/ </tspan>
<tspan x="50" dy="11" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="1.2s" fill="freeze"/>     __| |__</tspan>
<tspan x="50" dy="11" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="1.3s" fill="freeze"/>    /  ___  \</tspan>
<tspan x="50" dy="11" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="1.4s" fill="freeze"/>   /  /   \  \</tspan>
<tspan x="50" dy="11" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="1.5s" fill="freeze"/>  /  / | | \  \</tspan>
<tspan x="50" dy="11" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="1.6s" fill="freeze"/> /__/  | |  \__\</tspan>
<tspan x="50" dy="11" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="1.7s" fill="freeze"/>       |_|</tspan>
<tspan x="50" dy="11" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="1.8s" fill="freeze"/> [SYSTEM READY]</tspan>
    </text>
  </g>

  <!-- RIGHT SIDE: Terminal Window -->
  <g class="floater" style="animation-delay: 1s; transform-origin: 814px 305px;">
    <rect x="448" y="50" width="682" height="510" rx="16" class="terminal-window"/>
    
    <!-- Terminal Controls -->
    <circle cx="478" cy="78" r="7" fill="#EF4444"/>
    <circle cx="503" cy="78" r="7" fill="#F59E0B"/>
    <circle cx="528" cy="78" r="7" fill="#10B981"/>

    <!-- Greeting & Name -->
    <text x="478" y="140" fill="#F8FAFC" font-size="20">
      Hi <tspan font-family="Arial, sans-serif" opacity="0"><animate attributeName="opacity" to="1" dur="0.1s" begin="2.0s" fill="freeze"/>👋</tspan>,
    </text>
    <text x="478" y="170" fill="#F8FAFC" font-size="18">
      I'm
    </text>
    <text x="478" y="220" fill="#F8FAFC" font-size="44" font-weight="800">
      A<tspan opacity="0"><animate attributeName="opacity" to="1" dur="0.1s" begin="2.1s" fill="freeze"/>B</tspan><tspan opacity="0"><animate attributeName="opacity" to="1" dur="0.1s" begin="2.2s" fill="freeze"/>D</tspan><tspan opacity="0"><animate attributeName="opacity" to="1" dur="0.1s" begin="2.3s" fill="freeze"/>U</tspan><tspan opacity="0"><animate attributeName="opacity" to="1" dur="0.1s" begin="2.4s" fill="freeze"/>L</tspan><tspan opacity="0"><animate attributeName="opacity" to="1" dur="0.1s" begin="2.5s" fill="freeze"/>L</tspan><tspan opacity="0"><animate attributeName="opacity" to="1" dur="0.1s" begin="2.6s" fill="freeze"/>A</tspan><tspan opacity="0"><animate attributeName="opacity" to="1" dur="0.1s" begin="2.7s" fill="freeze"/>H</tspan> <tspan opacity="0"><animate attributeName="opacity" to="1" dur="0.1s" begin="2.8s" fill="freeze"/>K</tspan><tspan opacity="0"><animate attributeName="opacity" to="1" dur="0.1s" begin="2.9s" fill="freeze"/>H</tspan><tspan opacity="0"><animate attributeName="opacity" to="1" dur="0.1s" begin="3.0s" fill="freeze"/>A</tspan><tspan opacity="0"><animate attributeName="opacity" to="1" dur="0.1s" begin="3.1s" fill="freeze"/>T</tspan><tspan opacity="0"><animate attributeName="opacity" to="1" dur="0.1s" begin="3.2s" fill="freeze"/>E</tspan><tspan opacity="0"><animate attributeName="opacity" to="1" dur="0.1s" begin="3.3s" fill="freeze"/>E</tspan><tspan opacity="0"><animate attributeName="opacity" to="1" dur="0.1s" begin="3.4s" fill="freeze"/>B</tspan>
    </text>

    <!-- Corrected Fixed Non-Overlapping Subtitle Loop -->
    <g transform="translate(478, 270)" font-size="18">
      <text x="0" y="0" fill="#94A3B8">&gt;</text>
      <text x="22" y="0" fill="#06B6D4" class="loop-1">DevSecOps</text>
      <text x="22" y="0" fill="#06B6D4" class="loop-2">Cloud &amp; Automation</text>
      <text x="22" y="0" fill="#06B6D4" class="loop-3">Linux Systems &amp; Networking</text>
      <rect y="-16" width="12" height="19" class="cursor" x="22"/>
    </g>

    <!-- Profile Details (Cleaned, Education removed, spacing balanced) -->
    <g style="font-size: 15px;" transform="translate(0, -10)">
      <text x="478" y="340" fill="#94A3B8" opacity="0"><animate attributeName="opacity" to="1" dur="0.3s" begin="4.0s" fill="freeze"/><tspan fill="#F8FAFC">💻 Current Focus</tspan></text>
      <text x="615" y="340" fill="#06B6D4" opacity="0"><animate attributeName="opacity" to="1" dur="0.3s" begin="4.0s" fill="freeze"/>Linux • Net • Cyber</text>
      
      <text x="478" y="370" fill="#94A3B8" opacity="0"><animate attributeName="opacity" to="1" dur="0.3s" begin="4.2s" fill="freeze"/><tspan fill="#F8FAFC">🛠️ Learning</tspan></text>
      <text x="615" y="370" fill="#10B981" opacity="0"><animate attributeName="opacity" to="1" dur="0.3s" begin="4.2s" fill="freeze"/>Networking • Bash Scripting</text>
      
      <text x="478" y="400" fill="#94A3B8" opacity="0"><animate attributeName="opacity" to="1" dur="0.3s" begin="4.4s" fill="freeze"/><tspan fill="#F8FAFC">📧 Email</tspan></text>
      <text x="615" y="400" fill="#F8FAFC" opacity="0"><animate attributeName="opacity" to="1" dur="0.3s" begin="4.4s" fill="freeze"/>ifhamkhateeb@gmail.com</text>
      
      <text x="478" y="430" fill="#94A3B8" opacity="0"><animate attributeName="opacity" to="1" dur="0.3s" begin="4.6s" fill="freeze"/><tspan fill="#F8FAFC">🌐 GitHub</tspan></text>
      <text x="615" y="430" fill="#7C3AED" opacity="0"><animate attributeName="opacity" to="1" dur="0.3s" begin="4.6s" fill="freeze"/>/abdullah-khateeb</text>
    </g>

    <!-- Skills (Glowing Pills - Sorted Alphabetically) -->
    <g transform="translate(478, 475)" style="font-size: 13px; fill: #F8FAFC;">
      <rect x="0" y="0" width="60" height="26" rx="13" class="skill-pill"/>
      <text x="12" y="17">Arduino</text>
      
      <rect x="68" y="0" width="50" height="26" rx="13" class="skill-pill"/>
      <text x="80" y="17">Bash</text>
      
      <rect x="126" y="0" width="95" height="26" rx="13" class="skill-pill"/>
      <text x="138" y="17">Cybersecurity</text>
      
      <rect x="229" y="0" width="50" height="26" rx="13" class="skill-pill"/>
      <text x="241" y="17">Docker</text>
      
      <rect x="287" y="0" width="45" height="26" rx="13" class="skill-pill"/>
      <text x="300" y="17">Git</text>

      <rect x="0" y="34" width="55" height="26" rx="13" class="skill-pill"/>
      <text x="12" y="51">Linux</text>
      
      <rect x="63" y="34" width="85" height="26" rx="13" class="skill-pill"/>
      <text x="75" y="51">Networking</text>

      <rect x="156" y="34" width="58" height="26" rx="13" class="skill-pill"/>
      <text x="166" y="51">Python</text>

      <rect x="222" y="34" width="40" height="26" rx="13" class="skill-pill"/>
      <text x="234" y="51">Vim</text>
    </g>
  </g>

  <!-- BOTTOM: Minimal Glowing Icons -->
  <g transform="translate(590, 570)" class="floater" style="animation-delay: 2s; transform-origin: 0px 10px;">
    <!-- GitHub -->
    <path d="M-60 -10 A 20 20 0 1 0 -20 -10 A 20 20 0 1 0 -60 -10 Z" fill="#0F172A" stroke="rgba(255,255,255,0.08)" filter="url(#skillGlow)">
      <animate attributeName="stroke" values="rgba(255,255,255,0.08);rgba(6,182,212,1);rgba(255,255,255,0.08)" dur="3s" repeatCount="indefinite" />
    </path>
    <path d="M-40-19.5c-5.2 0-9.5 4.3-9.5 9.5 0 4.2 2.7 7.7 6.5 9 0.5 0.1 0.7-0.2 0.7-0.5 0-0.2 0-0.9 0-1.7-2.6 0.6-3.2-1.3-3.2-1.3-0.4-1.1-1-1.4-1-1.4-0.9-0.6 0.1-0.6 0.1-0.6 1 0.1 1.5 1 1.5 1 0.8 1.4 2.2 1 2.8 0.8 0.1-0.6 0.3-1 0.6-1.3-2.1-0.2-4.3-1-4.3-4.7 0-1 0.4-1.9 1-2.6-0.1-0.2-0.4-1.2 0.1-2.6 0 0 0.8-0.3 2.6 1 0.8-0.2 1.6-0.3 2.4-0.3s1.6 0.1 2.4 0.3c1.8-1.2 2.6-1 2.6-1 0.5 1.4 0.2 2.4 0.1 2.6 0.6 0.7 1 1.6 1 2.6 0 3.6-2.2 4.4-4.3 4.7 0.3 0.3 0.6 0.9 0.6 1.8 0 1.3 0 2.3 0 2.7 0 0.3 0.2 0.6 0.7 0.5 3.8-1.3 6.5-4.8 6.5-9 0-5.2-4.3-9.5-9.5-9.5z" fill="#F8FAFC"/>

    <!-- LinkedIn -->
    <path d="M-20 -10 A 20 20 0 1 0 20 -10 A 20 20 0 1 0 -20 -10 Z" fill="#0F172A" stroke="rgba(255,255,255,0.08)">
      <animate attributeName="stroke" values="rgba(255,255,255,0.08);rgba(124,58,237,1);rgba(255,255,255,0.08)" dur="3s" begin="1s" repeatCount="indefinite" />
    </path>
    <path d="M-12-16.5h2.5v11H-12v-11zm1.25-1.9c0.8 0 1.5-0.7 1.5-1.5s-0.7-1.5-1.5-1.5-1.5 0.7-1.5 1.5 0.7 1.5 1.5 1.5zM-6.5-16.5h2.5v1.5h0c0.3-0.6 1.1-1.2 2.3-1.2 2.4 0 2.9 1.6 2.9 3.7v7.5H11v-7c0-1.8-0.4-2.8-1.7-2.8s-1.8 1.1-1.8 2.5v7.3H5v-11H7.5v1.5z" fill="#F8FAFC" transform="translate(-14, 0)"/>

    <!-- Email -->
    <path d="M20 -10 A 20 20 0 1 0 60 -10 A 20 20 0 1 0 20 -10 Z" fill="#0F172A" stroke="rgba(255,255,255,0.08)">
      <animate attributeName="stroke" values="rgba(255,255,255,0.08);rgba(16,185,129,1);rgba(255,255,255,0.08)" dur="3s" begin="2s" repeatCount="indefinite" />
    </path>
    <path d="M40-20.5c-5.2 0-9.5 4.3-9.5 9.5s4.3 9.5 9.5 9.5 9.5-4.3 9.5-9.5-4.3-9.5-9.5-9.5zm0 2c1.2 0 2.3 0.4 3.3 1L40-13.5l-3.3-4c1-0.6 2.1-1 3.3-1zm-6 3.3l4 4.8v3.9l-4-4.8v-3.9zm6 8l3-3.6 3 3.6h-6zm6-3.3v3.9l-4-4.8v-3.9l4 4.8z" fill="#F8FAFC"/>
  </g>
</svg>
